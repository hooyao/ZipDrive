name: Release

on:
  push:
    tags: ['release-*']

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Parse version from tag
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^release-', ''
          Write-Output "VERSION=$version" >> $env:GITHUB_OUTPUT
          if ($version -match '-') {
            Write-Output "PRERELEASE=true" >> $env:GITHUB_OUTPUT
          } else {
            Write-Output "PRERELEASE=false" >> $env:GITHUB_OUTPUT
          }
          Write-Host "Version: $version, Prerelease: $($version -match '-')"

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore ZipDrive.slnx

      - name: Build
        run: dotnet build ZipDrive.slnx -c Release --no-restore

      - name: Test
        shell: pwsh
        run: |
          $projects = @(
            "tests/ZipDrive.Domain.Tests/ZipDrive.Domain.Tests.csproj",
            "tests/ZipDrive.Infrastructure.Caching.Tests/ZipDrive.Infrastructure.Caching.Tests.csproj",
            "tests/ZipDrive.Infrastructure.Archives.Zip.Tests/ZipDrive.Infrastructure.Archives.Zip.Tests.csproj",
            "tests/ZipDrive.IntegrationTests/ZipDrive.IntegrationTests.csproj"
          )
          $failed = $false
          foreach ($proj in $projects) {
            dotnet test $proj -c Release --no-build --verbosity normal
            if ($LASTEXITCODE -ne 0) { $failed = $true }
          }
          if ($failed) { exit 1 }

      - name: Publish single-file executable
        run: >
          dotnet publish src/ZipDrive.Cli/ZipDrive.Cli.csproj
          -c Release -r win-x64 --self-contained false
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:Version=${{ steps.version.outputs.VERSION }}
          -o ./publish

      - name: Package release archive
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          Compress-Archive -Path publish/ZipDrive.exe, publish/appsettings.json -DestinationPath "ZipDrive-$version.zip"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          $prerelease = "${{ steps.version.outputs.PRERELEASE }}"
          $args = @(
            "release", "create", "v$version",
            "--title", "ZipDrive $version",
            "--generate-notes",
            "ZipDrive-$version.zip"
          )
          if ($prerelease -eq "true") {
            $args += "--prerelease"
          }
          gh @args
