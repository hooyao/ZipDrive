name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore ZipDriveV3.slnx

      - name: Build
        run: dotnet build ZipDriveV3.slnx -c Release --no-restore

      - name: Test
        run: |
          $projects = @(
            "tests/ZipDriveV3.Domain.Tests/ZipDriveV3.Domain.Tests.csproj",
            "tests/ZipDriveV3.Infrastructure.Caching.Tests/ZipDriveV3.Infrastructure.Caching.Tests.csproj",
            "tests/ZipDriveV3.Infrastructure.Archives.Zip.Tests/ZipDriveV3.Infrastructure.Archives.Zip.Tests.csproj",
            "tests/ZipDriveV3.IntegrationTests/ZipDriveV3.IntegrationTests.csproj"
          )
          $failed = $false
          foreach ($proj in $projects) {
            $name = [System.IO.Path]::GetFileNameWithoutExtension($proj)
            dotnet test $proj -c Release --no-build --verbosity normal `
              --logger "trx;LogFileName=$name.trx" `
              --results-directory ./TestResults `
              --collect:"XPlat Code Coverage"
            if ($LASTEXITCODE -ne 0) { $failed = $true }
          }
          if ($failed) { exit 1 }
        shell: pwsh

      - name: Test report
        uses: dorny/test-reporter@v2
        if: always()
        with:
          name: Test Results
          path: TestResults/*.trx
          reporter: dotnet-trx
          fail-on-error: true
          use-actions-summary: 'true'
          only-summary: 'false'
          list-suites: all
          list-tests: failed

      - name: Post test and coverage summary
        if: always()
        shell: bash
        run: |
          # Test summary
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Suite | Passed | Failed | Skipped | Total |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------:|-------:|--------:|------:|" >> $GITHUB_STEP_SUMMARY

          total_passed=0
          total_failed=0
          total_skipped=0

          for trx in TestResults/*.trx; do
            name=$(basename "$trx" .trx | sed 's/ZipDriveV3\.//' | sed 's/\.Tests$//')
            passed=$(grep -oP 'passed="\K[0-9]+' "$trx" | tail -1)
            failed=$(grep -oP 'failed="\K[0-9]+' "$trx" | tail -1)
            total=$(grep -oP ' total="\K[0-9]+' "$trx" | tail -1)
            skipped=$((total - passed - failed))
            total_passed=$((total_passed + passed))
            total_failed=$((total_failed + failed))
            total_skipped=$((total_skipped + skipped))
            if [ "$failed" -gt 0 ]; then icon=":x:"; else icon=":white_check_mark:"; fi
            echo "| $icon $name | $passed | $failed | $skipped | $total |" >> $GITHUB_STEP_SUMMARY
          done

          grand_total=$((total_passed + total_failed + total_skipped))
          echo "| **Total** | **$total_passed** | **$total_failed** | **$total_skipped** | **$grand_total** |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Coverage summary
          dotnet tool install -g dotnet-reportgenerator-globaltool --verbosity quiet
          reportgenerator "-reports:TestResults/**/coverage.cobertura.xml" "-targetdir:TestResults/CoverageReport" "-reporttypes:MarkdownSummaryGithub"
          cat TestResults/CoverageReport/SummaryGithub.md >> $GITHUB_STEP_SUMMARY
