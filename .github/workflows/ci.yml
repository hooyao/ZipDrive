name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore ZipDriveV3.slnx

      - name: Build
        run: dotnet build ZipDriveV3.slnx -c Release --no-restore

      - name: Test
        run: |
          $projects = @(
            "tests/ZipDriveV3.Domain.Tests/ZipDriveV3.Domain.Tests.csproj",
            "tests/ZipDriveV3.Infrastructure.Caching.Tests/ZipDriveV3.Infrastructure.Caching.Tests.csproj",
            "tests/ZipDriveV3.Infrastructure.Archives.Zip.Tests/ZipDriveV3.Infrastructure.Archives.Zip.Tests.csproj",
            "tests/ZipDriveV3.IntegrationTests/ZipDriveV3.IntegrationTests.csproj"
          )
          $failed = $false
          foreach ($proj in $projects) {
            $name = [System.IO.Path]::GetFileNameWithoutExtension($proj)
            dotnet test $proj -c Release --no-build --verbosity normal `
              --logger "trx;LogFileName=$name.trx" `
              --results-directory ./TestResults `
              --collect:"XPlat Code Coverage"
            if ($LASTEXITCODE -ne 0) { $failed = $true }
          }
          if ($failed) { exit 1 }
        shell: pwsh

      - name: Test report
        uses: dorny/test-reporter@v2
        if: always()
        with:
          name: Test Results
          path: TestResults/*.trx
          reporter: dotnet-trx
          fail-on-error: true
          use-actions-summary: 'true'
          only-summary: 'false'
          list-suites: all
          list-tests: failed

      - name: Merge coverage reports
        if: always()
        run: |
          dotnet tool install -g dotnet-reportgenerator-globaltool
          reportgenerator "-reports:TestResults/**/coverage.cobertura.xml" "-targetdir:TestResults/CoverageReport" "-reporttypes:MarkdownSummaryGithub"
        shell: pwsh

      - name: Post coverage summary
        if: always()
        run: |
          $report = Get-Content TestResults/CoverageReport/SummaryGithub.md -Raw
          echo $report >> $env:GITHUB_STEP_SUMMARY
        shell: pwsh
