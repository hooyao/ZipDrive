\* TLC Configuration: ChunkedExtraction
\* Verifies the writer/reader chunk synchronization protocol.
\*
\* Run: java -jar tla2tools.jar -config ChunkedExtraction.cfg ChunkedExtraction.tla

SPECIFICATION FairSpec

CONSTANT NumChunks = 3
CONSTANT r1 = r1
CONSTANT r2 = r2
CONSTANT Readers = {r1, r2}

SYMMETRY ReaderSymmetry

INVARIANT TypeOK
INVARIANT NoStaleRead
INVARIANT WriterMonotonic

PROPERTY AllReadersComplete
PROPERTY WriterTerminates
