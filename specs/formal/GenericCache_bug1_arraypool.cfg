\* TLC Configuration: Bug #1 — ArrayPool Return-Reuse-Overwrite (Memory Tier)
\*
\* Models the pre-fix state where MemoryStorageStrategy used ArrayPool:
\*   - Layer 1 has NO storageDisposed check, NO FNFE catch
\*   - Eviction disposal returns byte[] to pool → data corruption
\*
\* CONCURRENCY_STRATEGY.md §"Bug #1: ArrayPool Return-Reuse-Overwrite"
\* Expected: TLC finds NoUseAfterDispose OR NoUnhandledException violation.
\*
\* Run: java -jar tla2tools.jar -config GenericCache_bug1_arraypool.cfg GenericCache.tla

SPECIFICATION Spec

CONSTANT b1 = b1
CONSTANT Borrowers = {b1}
CONSTANT k1 = k1
CONSTANT Keys = {k1}
CONSTANT Layer1FixEnabled = FALSE
CONSTANT Layer2FixEnabled = FALSE
CONSTANT MemoryTierSafe = FALSE

INVARIANT TypeOK
INVARIANT NoUseAfterDispose
INVARIANT NoUnhandledException
INVARIANT RefCountNonNeg
