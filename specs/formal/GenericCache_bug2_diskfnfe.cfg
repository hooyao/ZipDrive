\* TLC Configuration: Bug #2 — Temp File Deletion During Read (Disk Tier)
\*
\* Models the pre-fix state where disk tier eviction deletes the backing file:
\*   - Layer 1 has NO FNFE catch (FileNotFoundException propagates)
\*   - storageDisposed check present but insufficient alone
\*
\* CONCURRENCY_STRATEGY.md §"Bug #2: Temp File Deletion During Read"
\* Expected: TLC finds NoUnhandledException violation.
\*
\* Run: java -jar tla2tools.jar -config GenericCache_bug2_diskfnfe.cfg GenericCache.tla

SPECIFICATION Spec

CONSTANT b1 = b1
CONSTANT Borrowers = {b1}
CONSTANT k1 = k1
CONSTANT Keys = {k1}
CONSTANT Layer1FixEnabled = FALSE
CONSTANT Layer2FixEnabled = FALSE
CONSTANT MemoryTierSafe = FALSE

INVARIANT TypeOK
INVARIANT NoUseAfterDispose
INVARIANT NoUnhandledException
INVARIANT RefCountNonNeg
