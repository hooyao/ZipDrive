\* TLC Configuration: Bug #1 Fix — GC byte[] replaces ArrayPool
\*
\* Models the fix: MemoryTierSafe=TRUE means eviction disposal is a no-op
\* for the underlying byte[]. GC guarantees the array survives as long as
\* any MemoryStream reference exists. Even WITHOUT the storageDisposed check,
\* the reader sees valid data because the GC prevents reuse.
\*
\* Expected: TLC finds NO violations (GC-managed storage is inherently safe).
\*
\* Run: java -jar tla2tools.jar -config GenericCache_bug1_fix.cfg GenericCache.tla

SPECIFICATION Spec

CONSTANT b1 = b1
CONSTANT Borrowers = {b1}
CONSTANT k1 = k1
CONSTANT Keys = {k1}
CONSTANT Layer1FixEnabled = FALSE
CONSTANT Layer2FixEnabled = FALSE
CONSTANT MemoryTierSafe = TRUE

INVARIANT TypeOK
INVARIANT NoUseAfterDispose
INVARIANT NoUnhandledException
INVARIANT RefCountNonNeg
